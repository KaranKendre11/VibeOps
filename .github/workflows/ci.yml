name: CI

on: [push, pull_request]

jobs:
  quality:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        # The terraform-runner unit tests locate the binary via _find_terraform()
        # before mocking the subprocess, so the CLI must be on PATH. terraform_wrapper
        # is disabled so subprocess stdout parsing sees raw terraform output.
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install project and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "ruff>=0.6" "mypy>=1.11" "pytest>=8" "pytest-mock>=3.14"

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Mypy (strict type-check)
        run: python -m mypy src

      - name: Pytest (unit tests, skip live)
        run: python -m pytest -m "not live" -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
